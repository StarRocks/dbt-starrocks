name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  integration-test:
    runs-on: ubuntu-latest
    
    services:
      starrocks:
        image: starrocks/allin1-ubuntu:3.5.6
        ports:
          - 9030:9030
          - 8030:8030
          - 8040:8040
        options: >-
          --health-cmd "mysql -h127.0.0.1 -P9030 -uroot -e 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python
        run: uv venv --python 3.11
      
      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client=8.0*
      
      - name: Install dependencies
        run: |
          source .venv/bin/activate
          uv pip install -r dev_requirements.txt
          uv pip install -e .

      - name: Run unit tests
        run: |
          source .venv/bin/activate
          uv run pytest tests/unit

      - name: Run integration tests
        run: |
          source .venv/bin/activate
          sleep 30
          uv run pytest tests/functional

  external-catalog-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python
        run: uv venv --python 3.11

      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client=8.0*

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          uv pip install -r dev_requirements.txt
          uv pip install -e .

      - name: Start Iceberg stack
        run: docker compose -f .github/docker-compose.iceberg.yml up --detach --wait --wait-timeout 400

      - name: Create Iceberg catalog
        run: |
          mysql -h 127.0.0.1 -P 9030 -u root -e "
            CREATE EXTERNAL CATALOG iceberg_catalog
            PROPERTIES (
              'type'='iceberg',
              'iceberg.catalog.type'='rest',
              'iceberg.catalog.uri'='http://iceberg-rest:8181',
              'iceberg.catalog.warehouse'='warehouse',
              'aws.s3.access_key'='admin',
              'aws.s3.secret_key'='password',
              'aws.s3.endpoint'='http://minio:9000',
              'aws.s3.enable_path_style_access'='true'
            );"

      - name: Run external catalog tests
        run: |
          source .venv/bin/activate
          uv run pytest tests/functional --runexternal -m external

      - name: Stop Iceberg stack
        if: always()
        run: docker compose -f .github/docker-compose.iceberg.yml down -v
